name: governance-gate

# JavaScript actions on Node 24 (runner transition); see GitHub changelog 2025-09-19.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  governance-gate:
    name: governance-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run generate --workspace backend

      - name: Run governance enforcement gate
        run: npm test --workspace backend -- tests/dashboard_v1_governance.test.ts tests/workflow_phase_a_api.test.ts tests/org_config_rbac.test.ts tests/enablement_import_api.test.ts tests/auth_secret.test.ts
