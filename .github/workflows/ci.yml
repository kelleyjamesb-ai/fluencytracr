name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run V1 governance gates
        run: python scripts/ci_v1_governance_gates.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
  node-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Build shared workspace
        run: npm run build --workspace shared
      - name: Run backend tests
        run: npm run test:ci --workspace backend
      - name: Run frontend tests
        run: npm test --workspace frontend
      - name: Run suppression regression evidence suite
        run: ./scripts/ci_suppression_evidence.sh
      - name: Upload suppression evidence artifact
        if: always() && hashFiles('artifacts/phase3/suppression/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: suppression-evidence
          path: artifacts/phase3/suppression
          if-no-files-found: warn
