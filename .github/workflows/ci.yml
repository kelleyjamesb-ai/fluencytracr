name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run V1 governance gates
        run: python scripts/ci_v1_governance_gates.py
      - name: Run TG5 forbidden key gates
        run: python scripts/ci_tg5_forbidden_schema_keys.py
      - name: Run Phase 5A guardrails
        run: python scripts/ci_phase5_guardrails.py
      - name: Run Phase 6 governance lock
        run: python scripts/ci_phase6_governance_lock.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
  node-tests:
    runs-on: ubuntu-latest
    env:
      GOVERNANCE_ENFORCEMENT: "ON"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Build shared workspace
        run: npm run build --workspace shared
      - name: Run backend tests
        run: npm test --workspace backend
      - name: Run Phase 5 required test guardrail
        run: python3 scripts/ci_phase5_required_tests.py
