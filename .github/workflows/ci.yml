name: CI

# Opt into Node 24 for JavaScript-based actions before runner default (see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run V1 governance gates
        run: python scripts/ci_v1_governance_gates.py
      - name: Run unit tests
        run: python -m pytest tests/ -q
  node-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install ripgrep (doc sweep / linkcheck scripts)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: npm install
      - name: Build shared workspace
        run: npm run build --workspace shared
      - name: Run backend tests
        run: npm run test:ci --workspace backend
      - name: Run frontend tests
        run: npm test --workspace frontend
      - name: Run suppression regression evidence suite
        run: ./scripts/ci_suppression_evidence.sh
      - name: Validate EvidenceBundle schema and examples
        run: bash scripts/validate_evidence_bundle_schema.sh
      - name: Run docs and contract sweep
        run: bash scripts/ci_docs_contract_sweep.sh
      - name: Run scoped FluencyTracr docs link check
        run: bash scripts/ci_linkcheck_fluency_docs.sh
      - name: Upload suppression evidence artifact
        if: always() && hashFiles('artifacts/phase3/suppression/**') != ''
        uses: actions/upload-artifact@v5
        with:
          name: suppression-evidence
          path: artifacts/phase3/suppression
          if-no-files-found: warn
