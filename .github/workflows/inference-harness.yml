name: Inference Harness

# Opt into Node 24 for JavaScript-based actions before runner default (see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  # DYNAMIC_ARCH kernels vary by runner CPU; pin the exact CI oracle target.
  OPENBLAS_CORETYPE: "Haswell"
  VECLIB_MAXIMUM_THREADS: "1"

on:
  push:
    branches:
      - "main"
    paths:
      - "inference/**"
      - "packages/confidence-engine/src/**"
      - "packages/confidence-engine/test/inference_proof_artifact_bridge.test.mjs"
      - "packages/confidence-engine/test/longitudinal_state_space_concordance.test.mjs"
      - "packages/confidence-engine/test/longitudinal_synthetic_outcome_proof.test.mjs"
      - "packages/confidence-engine/test/fixtures/inference_proof_artifact_*.json"
      - "shared/src/aiValueEngine/aiFluencyInstrumentSnapshot.ts"
      - "shared/src/aiValueEngine/index.ts"
      - "scripts/validate_ai_value_ai_fluency_instrument_snapshot.test.mjs"
      - "docs/contracts/confidence-inference-methodology/**"
      - "docs/contracts/ai-value-ai-fluency-instrument-snapshot/**"
      - "docs/contracts/ai-value-longitudinal-synthetic-outcome-proof/**"
      - "docs/contracts/bayesian-ai-value-realization-and-human-transformation-model-family/**"
      - "openspec/changes/add-bayesian-inference-proof-harness/**"
      - "openspec/changes/add-ai-fluency-instrument-snapshot-longitudinal-proof/**"
      - "openspec/changes/add-longitudinal-state-space-nuts-concordance/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/inference-harness.yml"
  pull_request:
    paths:
      - "inference/**"
      - "packages/confidence-engine/src/**"
      - "packages/confidence-engine/test/inference_proof_artifact_bridge.test.mjs"
      - "packages/confidence-engine/test/longitudinal_state_space_concordance.test.mjs"
      - "packages/confidence-engine/test/longitudinal_synthetic_outcome_proof.test.mjs"
      - "packages/confidence-engine/test/fixtures/inference_proof_artifact_*.json"
      - "shared/src/aiValueEngine/aiFluencyInstrumentSnapshot.ts"
      - "shared/src/aiValueEngine/index.ts"
      - "scripts/validate_ai_value_ai_fluency_instrument_snapshot.test.mjs"
      - "docs/contracts/confidence-inference-methodology/**"
      - "docs/contracts/ai-value-ai-fluency-instrument-snapshot/**"
      - "docs/contracts/ai-value-longitudinal-synthetic-outcome-proof/**"
      - "docs/contracts/bayesian-ai-value-realization-and-human-transformation-model-family/**"
      - "openspec/changes/add-bayesian-inference-proof-harness/**"
      - "openspec/changes/add-ai-fluency-instrument-snapshot-longitudinal-proof/**"
      - "openspec/changes/add-longitudinal-state-space-nuts-concordance/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/inference-harness.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  inference-plan:
    name: inference-plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.shards.outputs.shards }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Validate inference shard plan
        id: shards
        run: |
          python inference/qa/run_test_shard.py validate
          echo "shards=$(python inference/qa/run_test_shard.py matrix)" >> "$GITHUB_OUTPUT"

  inference-python:
    name: inference-python (${{ matrix.shard }})
    needs: inference-plan
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.inference-plan.outputs.shards) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: inference/requirements.lock
      - name: Install pinned inference environment
        run: |
          python -m venv inference/.venv
          inference/.venv/bin/python -m pip install --upgrade pip
          inference/.venv/bin/pip install -r inference/requirements.lock
      - name: Record pinned inference runtime
        run: inference/.venv/bin/python inference/qa/verify_ci_runtime.py
      - name: Validate and run inference shard
        run: |
          PYTHONPATH=inference/src inference/.venv/bin/python \
            inference/qa/run_test_shard.py validate
          PYTHONPATH=inference/src inference/.venv/bin/python \
            inference/qa/run_test_shard.py run "${{ matrix.shard }}"

  inference-bridge:
    name: inference-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: inference/requirements.lock
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false
      - name: Install pinned inference environment
        run: |
          python -m venv inference/.venv
          inference/.venv/bin/python -m pip install --upgrade pip
          inference/.venv/bin/pip install -r inference/requirements.lock
      - name: Record pinned inference runtime
        run: inference/.venv/bin/python inference/qa/verify_ci_runtime.py
      - name: Install Node dependencies
        run: npm ci
      - name: Validate longitudinal concordance OpenSpec
        run: npx openspec validate add-longitudinal-state-space-nuts-concordance --strict
      - name: Run AI Fluency snapshot boundary test
        run: npm run test:ai-value-ai-fluency-instrument-snapshot
      - name: Run Python to TypeScript inference bridge
        run: |
          set -euo pipefail
          test -x inference/.venv/bin/python
          npm run build --workspace packages/confidence-engine
          bridge_report="${RUNNER_TEMP:-/tmp}/inference-bridge.tap"
          node --test --test-reporter=tap \
            packages/confidence-engine/test/inference_proof_artifact_bridge.test.mjs \
            packages/confidence-engine/test/longitudinal_state_space_concordance.test.mjs \
            packages/confidence-engine/test/longitudinal_synthetic_outcome_proof.test.mjs \
            | tee "$bridge_report"
          summary_value() {
            awk -v key="$1" '$1 == "#" && $2 == key { value = $3 } END { print value }' \
              "$bridge_report"
          }
          expected_tests="71"
          tests="$(summary_value tests)"
          passes="$(summary_value pass)"
          failures="$(summary_value fail)"
          cancelled="$(summary_value cancelled)"
          skipped="$(summary_value skipped)"
          todo="$(summary_value todo)"
          if [[ ! "$tests" =~ ^[1-9][0-9]*$ || \
                "$tests" != "$expected_tests" || \
                "$passes" != "$tests" || \
                "$failures" != "0" || \
                "$cancelled" != "0" || \
                "$skipped" != "0" || \
                "$todo" != "0" ]]; then
            printf 'bridge summary is not fully passing: expected=%s tests=%s pass=%s fail=%s cancelled=%s skipped=%s todo=%s\n' \
              "$expected_tests" "$tests" "$passes" "$failures" "$cancelled" "$skipped" "$todo"
            exit 1
          fi

  inference-harness:
    name: inference-harness
    if: ${{ always() }}
    needs:
      - inference-plan
      - inference-python
      - inference-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every inference check
        env:
          PLAN_RESULT: ${{ needs.inference-plan.result }}
          PYTHON_SHARDS_RESULT: ${{ needs.inference-python.result }}
          BRIDGE_RESULT: ${{ needs.inference-bridge.result }}
        run: |
          if [[ "$PLAN_RESULT" != "success" || \
                "$PYTHON_SHARDS_RESULT" != "success" || \
                "$BRIDGE_RESULT" != "success" ]]; then
            printf 'required inference checks failed: plan=%s shards=%s bridge=%s\n' \
              "$PLAN_RESULT" "$PYTHON_SHARDS_RESULT" "$BRIDGE_RESULT"
            exit 1
          fi
