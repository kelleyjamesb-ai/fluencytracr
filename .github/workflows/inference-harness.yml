name: Inference Harness

# Opt into Node 24 for JavaScript-based actions before runner default (see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
    paths:
      - "inference/**"
      - ".github/workflows/inference-harness.yml"
  pull_request:
    paths:
      - "inference/**"
      - ".github/workflows/inference-harness.yml"

jobs:
  inference-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pinned inference environment
        run: |
          python -m pip install --upgrade pip
          pip install -r inference/requirements.lock
      - name: Run inference harness suite
        run: python -m pytest inference/tests/ -q
