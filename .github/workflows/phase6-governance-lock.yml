name: Phase 6 Governance Lock

on:
  pull_request:
    branches:
      - main

jobs:
  governance-lock:
    name: "Phase 6: Block modifications to governance-controlled files"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Phase 6 governance lock
        run: python scripts/ci_phase6_governance_lock.py

  security-scans:
    name: "Phase 6: Blocking security scans"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: npm audit (blocking)
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          VIOLATIONS=""

          # Check for hardcoded passwords in non-test, non-example files
          PASSWORDS=$(grep -rn "password.*=.*['\"]" --include="*.ts" --include="*.js" --include="*.yml" --include="*.yaml" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude="*test*" --exclude="*.example*" \
            backend/ infra/ shared/ frontend/ 2>/dev/null || true)

          if [ -n "$PASSWORDS" ]; then
            VIOLATIONS="${VIOLATIONS}\nHardcoded passwords found:\n${PASSWORDS}"
          fi

          # Check for API keys
          API_KEYS=$(grep -rn "api[_-]key.*=.*['\"]" --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude="*test*" \
            backend/ shared/ frontend/ 2>/dev/null || true)

          if [ -n "$API_KEYS" ]; then
            VIOLATIONS="${VIOLATIONS}\nHardcoded API keys found:\n${API_KEYS}"
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo -e "PHASE 6 SECURITY SCAN FAILED:${VIOLATIONS}"
            exit 1
          fi

          echo "Secret scan passed."

  governance-regression:
    name: "Phase 6: Governance regression tests (REQUIRED)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fluency
          POSTGRES_PASSWORD: fluency
          POSTGRES_DB: fluency_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOVERNANCE_ENFORCEMENT: "ON"
      DATABASE_URL: "postgresql://fluency:fluency@localhost:5432/fluency_test?schema=public"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Build shared workspace
        run: npm run build --workspace shared

      - name: Apply Prisma migrations
        run: npx prisma@5.18.0 migrate deploy --schema=backend/prisma/schema.prisma

      - name: Generate Prisma client
        run: npx prisma@5.18.0 generate --schema=backend/prisma/schema.prisma

      - name: Run Phase 5 governance regression tests (REQUIRED - blocking)
        run: python3 scripts/ci_phase5_required_tests.py

      - name: Run Phase 6 auth, suppression, audit, and adversarial tests (REQUIRED - blocking)
        run: |
          npm test --workspace backend -- --runTestsByPath \
            "$GITHUB_WORKSPACE/backend/tests/phase6_auth_threat_model.test.ts" \
            "$GITHUB_WORKSPACE/backend/tests/phase6_suppression_ordering.test.ts" \
            "$GITHUB_WORKSPACE/backend/tests/phase6_audit_tamper_evident.test.ts" \
            "$GITHUB_WORKSPACE/backend/tests/phase6_adversarial_extraction.test.ts" \
            --watchman=false --runInBand

      - name: Run Phase 7 security route-auth audit tests (REQUIRED - blocking)
        run: |
          npm test --workspace backend -- --runTestsByPath \
            "$GITHUB_WORKSPACE/backend/tests/phase7_route_auth_coverage.test.ts" \
            "$GITHUB_WORKSPACE/backend/tests/phase7_audit_wiring.test.ts" \
            "$GITHUB_WORKSPACE/backend/tests/phase7_audit_concurrency.test.ts" \
            --watchman=false --runInBand

      - name: Run V1 governance gates
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          python scripts/ci_v1_governance_gates.py

      - name: Run TG5 forbidden key gates
        run: python scripts/ci_tg5_forbidden_schema_keys.py

      - name: Run Phase 5A guardrails
        run: python scripts/ci_phase5_guardrails.py

      - name: Run Phase 6 governance lock
        run: python scripts/ci_phase6_governance_lock.py
