name: Enforcement State Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  enforcement_state_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Validate CODEX enforcement state artifact
        run: python3 scripts/validate_enforcement_state.py
