name: Tests

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Lint workflows with actionlint
      uses: rhysd/actionlint@v1

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        python -m unittest discover -s tests -p 'test_*.py' -v

    - name: Type check with mypy
      run: |
        mypy src/ --strict
      continue-on-error: true  # Don't fail build on type errors initially

    - name: Lint with ruff
      run: |
        ruff check src/ tests/
      continue-on-error: true

  privacy-contract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Verify no sensitive fields in code
      run: |
        # Ensure non-collectable fields are not introduced
        ! grep -r "prompt_content\|output_content\|keystrokes\|file_names\|message_text\|raw.logs" src/ --exclude="data_contract.py" || exit 1
        echo "✅ Privacy contract validated"
