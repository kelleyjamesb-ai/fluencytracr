name: Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run V1 governance gates
      run: python scripts/ci_v1_governance_gates.py
    - name: Run TG5 forbidden key gates
      run: python scripts/ci_tg5_forbidden_schema_keys.py
        
    - name: Run Tests
      run: |
        pytest tests/
