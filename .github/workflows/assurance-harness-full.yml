name: Assurance Harness Full Scale

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql://fluency:fluency@localhost:5432/fluency?schema=public
  DIRECT_URL: postgresql://fluency:fluency@localhost:5432/fluency?schema=public
  JWT_SECRET: dev-secret
  DEV_HEADER_AUTH: "true"
  BACKEND_URL: http://localhost:4000
  BATCH_SIZE: "25"
  SKIP_IDEMPOTENCY: "true"
  PROGRESS_EVERY: "50000"

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

jobs:
  full-scale-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fluency
          POSTGRES_PASSWORD: fluency
          POSTGRES_DB: fluency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fluency -d fluency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check LMSYS dataset credentials
        id: lmsys-credentials
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            {
              echo "# Assurance Harness Full Scale"
              echo ""
              echo "Status: skipped"
              echo "Reason: HF_TOKEN GitHub secret is not configured."
              echo ""
              echo "Set the repository secret \`HF_TOKEN\` to enable the full LMSYS-Chat-1M assurance run."
            } > scripts/assurance-report.md
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.lmsys-credentials.outputs.available == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Set up Python
        if: steps.lmsys-credentials.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npm ci

      - name: Install Hugging Face dataset dependencies
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub

      - name: Build shared package
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npm run build --workspace shared

      - name: Create current schema in fresh CI database
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npx prisma db push --schema backend/prisma/schema.prisma --skip-generate

      - name: Baseline existing migrations for CI schema
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: |
          for migration in backend/prisma/migrations/*; do
            if [ -d "$migration" ]; then
              npx prisma migrate resolve --schema backend/prisma/schema.prisma --applied "$(basename "$migration")"
            fi
          done

      - name: Run Prisma migrations
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npx prisma migrate deploy --schema backend/prisma/schema.prisma

      - name: Generate Prisma client
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Download LMSYS-Chat-1M
        if: steps.lmsys-credentials.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from datasets import load_dataset

          token = os.environ.get("HF_TOKEN")
          if not token:
              raise SystemExit("HF_TOKEN GitHub secret is required for the full-scale assurance workflow")

          os.makedirs("data/lmsys", exist_ok=True)
          load_dataset("lmsys/lmsys-chat-1m", split="train", token=token).to_json("data/lmsys/conversations.jsonl")
          PY

      - name: Start backend
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: |
          npm run dev --workspace backend > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for Postgres-backed health
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: |
          node - <<'NODE'
          const deadline = Date.now() + 120_000;
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          while (Date.now() < deadline) {
            try {
              const response = await fetch("http://localhost:4000/health");
              const body = await response.json();
              console.log(JSON.stringify(body));
              if (response.ok && body.status === "ok" && body.db === "postgres") {
                process.exit(0);
              }
            } catch (error) {
              console.log(`Waiting for backend: ${error.message}`);
            }
            await sleep(2000);
          }
          console.error("Backend did not report db: postgres before timeout");
          process.exit(1);
          NODE

      - name: Run seed self-test
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npm run test:seed

      - name: Seed full LMSYS dataset
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npm run seed:lmsys

      - name: Verify assurance properties
        if: steps.lmsys-credentials.outputs.available == 'true'
        run: npm run verify:assurance

      - name: Upload assurance report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: assurance-report-full-scale
          path: scripts/assurance-report.md
          if-no-files-found: error

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: assurance-backend-log-full-scale
          path: backend.log
          if-no-files-found: warn
