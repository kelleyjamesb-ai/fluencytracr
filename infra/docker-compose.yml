version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fluencytracr-postgres
    environment:
      POSTGRES_USER: fluency
      POSTGRES_PASSWORD: fluency
      POSTGRES_DB: fluency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluency -d fluency"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
