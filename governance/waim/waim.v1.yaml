version: v1

placements:

  - id: edit_correction_verification
    role: individual_contributor
    workflow: document_editing
    signal: verification_presence

    trigger:
      event: HUMAN_CORRECTION
      phase: post_ai_insertion
      before: content_share

    appearance:
      max_duration_ms: 2000
      non_deterministic: true
      ephemeral: true

    suppression:
      repeat_within_session: true
      same_workflow_step: true
      multiple_corrections: true
      ambiguity: true
      cooldown_ms: 300000

    enforcement:
      layer:
        - client
        - api
      fail_closed: true

  - id: ai_output_abandonment_awareness
    role: individual_contributor
    workflow: content_generation
    signal: abandonment

    trigger:
      event: AI_OUTPUT_DISCARDED
      without_human_use: true

    appearance:
      max_duration_ms: 1500
      non_deterministic: true
      ephemeral: true

    suppression:
      repeat_within_session: true
      same_workflow_step: true
      rapid_retries: true
      ambiguity: true
      cooldown_ms: 300000

    enforcement:
      layer:
        - client
        - api
      fail_closed: true
